<p-table [value]="this.tableservice.skeets()"
[tableStyle]="{'min-width' : '100rem',
'max-width' : '700rem'}">
  <ng-template pTemplate="header">
    <tr>
      <th class="delete-header"></th>
      <th class="id-header">ID</th>
      <th class="text-header">Text</th>
      <th class="likes-header">Likes</th>
      <th class="replies-header">Replies</th>
      <th class="reposts-header">Reposts</th>
      <th class="time-header">Time</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-skeet>
    <tr>
      <td>
        <button (click)="deleteSkeet(skeet.uri)" class="btn btn-danger">Del skeet</button>
      </td>
      <td class="my-center">{{skeet.id}}</td>
      <td>{{skeet.txt}}</td>
      <td class="my-center">{{skeet.likes | number}}</td>
      <td class="my-center">{{skeet.replies | number}}</td>
      <td class="my-center">{{skeet.reposts | number}}</td>
      <td>{{skeet.time}}</td>
    </tr>
  </ng-template>

</p-table>
